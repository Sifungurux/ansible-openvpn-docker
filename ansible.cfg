[defaults]
# Allow Ansible to find the role by its directory name when run from project root
# Set to parent dir so Ansible resolves 'ansible-openvpn-docker' as this project's folder
roles_path = ..

[ssh_connection]
# SSH settings are passed per-run via ansible_ssh_extra_args using the Lima SSH config file
# Lima's SSH config already handles StrictHostKeyChecking, UserKnownHostsFile and identity files
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
